<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        align-items: center;
        justify-content: center;
        text-align: center;
        display: block;
        width: 100%;
        overflow: hidden;
      }
      #logo {
        margin-top: 35px;
      }
      h1,h2,h3,a,p {
        color: #FFF;
      }
      button {
        padding: 10px;
        margin: 10px;
        border-radius: 5px;
        background-color: #053154;
        font: helvetica;
      }
    </style>
  </head>
  <body>
    <img src="/assets/logo.png" id="logo" alt="Logo" />
    <h1>GSML</h1>
    <h2>Glow Squid Minecraft Launcher</h2>
    <h3>Welcome to GSML, Please read and agree to the <a href="https://example.com">lisence</a> to start using GSML</h3>
    <p>Tip: click on lisence to view it</p>
    <button onclick="localStorage.setItem('StartTimes',0);location.pathname='/';">I agree.</button>
    <button onclick="document.getElementById('alert').style.display='block'">I don't agree.</button>
    <p style="color: red;display: none;" id="alert">You must agree to the lisence to use GSML</p>
    <script src="/main.js"></script>
  </body>
</html>
